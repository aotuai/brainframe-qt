name: brainframe-client
summary: A smart vision platform that is built to be easy to scale and deploy
description: >
  BrainFrame is a smart vision platform that is built to be easy to scale,
  highly configurable, and deployable on-premises or to the cloud. This is its
  client.

  Powered by our automatic algorithm fusion and optimization engine,
  BrainFrame enables plug and play integration of VisionCapsules. This platform
  turns any connected camera into a smart sensor for sophisticated monitoring
  and inspection tasks, serving a variety of vertical markets.

  The client makes it easy to configure video streams, set up zones, and manage
  VisionCapsules without any programming experience.
# TODO: Update to core20 when the kde-neon extension supports it.
#       See: https://bugs.kde.org/show_bug.cgi?id=427576
base: core20
confinement: strict
grade: stable
adopt-info: brainframe-client

parts:
  brainframe-client:
    plugin: nil
    override-pull: |
      snapcraftctl pull
      # Only set version if it hasn't been set already
      if ! snapcraftctl get version &>/dev/null; then
        VERSION=$(awk -F'[ ="]+' '$1 == "version" { print $2 }' pyproject.toml)
        snapcraftctl set-version ${VERSION}
      fi
    override-build: |
      # Install system dependencies
      apt-get update
      apt-get install -y python3-pip python3-setuptools python3-wheel python3-venv

      # Upgrade pip and install Poetry
      pip3 install --upgrade pip
      pip3 install poetry==1.8.3

      # Create a virtual environment
      python3 -m venv /root/.venv
      . /root/.venv/bin/activate

      # Configure Poetry to use the virtual environment
      poetry config virtualenvs.in-project true

      # Install problematic packages separately
      pip install --ignore-installed httplib2 pyyaml tomli zipp importlib_metadata packaging==22.0 platformdirs

      # Manually uninstall pycairo (ignore errors)
      pip uninstall -y pycairo || true

      # Install project dependencies
      poetry install --no-root --only main --no-interaction

      # Set up installation directory
      export PYTHON_INSTALL_DIR=$SNAPCRAFT_PART_INSTALL/usr/local/lib/python3.8/site-packages
      mkdir -p $PYTHON_INSTALL_DIR

      # Copy virtual environment to the installation directory
      cp -r /root/.venv/* $PYTHON_INSTALL_DIR/

      # Copy project files
      cp -r brainframe_qt/ $PYTHON_INSTALL_DIR/
      # Remove undesirable file types
      find $PYTHON_INSTALL_DIR/brainframe_qt/ -name "*.pyc" -delete
      find $PYTHON_INSTALL_DIR/brainframe_qt/ -name "__pycache__" -type d -exec rm -r {} +

      # Add the main Python file
      cp brainframe_client.py $PYTHON_INSTALL_DIR/

      # Check for Gstly source (keeping this as is)
      export GSTLY_PATH=$(python3 -c "import pathlib, gstly; print(pathlib.Path(gstly.__file__).parent)")
      ! find ${GSTLY_PATH} -name "*.py" | grep .

      # Deactivate the virtual environment
      deactivate

      cp brainframe_client.py $SNAPCRAFT_PART_INSTALL
      chmod +x $SNAPCRAFT_PART_INSTALL/brainframe_client.py

    source: .
    build-packages:
      # Basic Python packages
      - python3-pip
      - python3-dev
      - python3-setuptools
      - python3-distutils
      - libpython3-dev
      # Poetry dependencies
      - curl
      - python3-venv
      - git
      # PyGObject dependencies
      - pkg-config
      - libcairo2-dev
      - libgirepository1.0-dev
      # Qt dependencies
      - qt5-default
      - pyqt5-dev-tools
      - qttools5-dev-tools
    stage-packages:
      # Basic Python packages
      - python3
      - python3-pip
      - python3-wheel
      - python3-setuptools
      - python3-distutils
      - libpython3.8
      # OpenGL and graphics
      - libglu1-mesa
      - freeglut3
      # For theming
      - adwaita-qt
      # PyQt
      - python3-pyqt5
      - python3-pyqt5.qtsvg
      # PyGObject dependencies
      - libgirepository-1.0-1
      - gstreamer1.0-plugins-base
      - gstreamer1.0-plugins-good
      - gstreamer1.0-plugins-bad
      - gstreamer1.0-libav
      - gir1.2-gst-plugins-base-1.0
      # Other
      - distro-info
    build-environment:
      # https://bugs.launchpad.net/snapcraft/+bug/1802345
      - C_INCLUDE_PATH: /usr/include/python3.8

apps:
  brainframe-client:
    command: brainframe_client.py
    extensions:
      - kde-neon
    plugs:
      - opengl
      - network
      - home
    environment:
      PYTHONPATH: "$SNAP/usr/local/lib/python3.8/site-packages:$PYTHONPATH"
      QT_STYLE_OVERRIDE: "adwaita-dark"
